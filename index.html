<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PRE261 Preductor</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f14" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="assets/icons/icon-256.png" alt="PRE261 Logo">
    <div>
      <h1>PRE261 Preductor</h1>
      <p>Football • Probabilités • Value • NO BET</p>
    </div>
  </div>
</header>

<main class="container">

  <!-- MATCH -->
  <section class="card">
    <h2>Match</h2>

    <div class="field">
      <label>Équipe domicile</label>
      <input id="homeTeam" type="text" placeholder="Home FC">
    </div>

    <div class="field">
      <label>Équipe extérieur</label>
      <input id="awayTeam" type="text" placeholder="Away FC">
    </div>

    <div class="grid3">
      <div class="field">
        <label>Odd 1</label>
        <input id="odd1" type="number" step="0.01">
      </div>
      <div class="field">
        <label>Odd X</label>
        <input id="oddX" type="number" step="0.01">
      </div>
      <div class="field">
        <label>Odd 2</label>
        <input id="odd2" type="number" step="0.01">
      </div>
    </div>

    <div class="divider"></div>

    <!-- VALUE ENGINE -->
    <div class="grid3">
      <div class="field">
        <label>Odd Over 2.5</label>
        <input id="oddOver25" type="number" step="0.01">
      </div>
      <div class="field">
        <label>Odd Under 2.5</label>
        <input id="oddUnder25" type="number" step="0.01">
      </div>
      <div class="field">
        <label>Odd BTTS (GG)</label>
        <input id="oddBTTS" type="number" step="0.01">
      </div>
    </div>

    <div class="divider"></div>

    <div class="actions">
      <button onclick="predict()">Predict</button>
      <button class="secondary" onclick="resetForm()">Reset</button>
    </div>

  </section>

  <!-- RESULTS -->
  <section class="card">
    <h2>Résultats</h2>
    <div id="results">
      Clique sur Predict...
    </div>
  </section>

</main>

<footer>
  <p>© 2026 PRE261 • Poisson Model • Value Engine v2.0</p>
</footer>

<script src="assets/js/app.js"></script>

</body>
</html>
